name: Publicar site (FTP)

# Só manual (workflow_dispatch).
# Requer secrets no repositório (Settings → Secrets and variables → Actions):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_REMOTE_DIR
# Opcional: FTP_PORT (default 21)
# Ver PUBLICAR-ONLINE.txt — secção «O QUE SÃO SECRETS FTP».
# Pré-visualização automática: workflow "Pré-visualização (GitHub Pages)".
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Enviar por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/cms/config.php
            **/backups/**
            **/package.json
            **/package-lock.json
            **/ABRIR-CMS.bat
            **/router.php
            **/fiveserver.config.js
