name: Pré-visualização (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Preparar ficheiros públicos
        run: |
          mkdir -p _preview
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'backups' \
            --exclude 'cms' \
            --exclude 'tools' \
            --exclude '*.bat' \
            --exclude 'router.php' \
            --exclude 'fiveserver.config.js' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'PUBLICAR-ONLINE.txt' \
            ./ _preview/

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Enviar artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _preview

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
